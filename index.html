<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>شات كتابي</title>
<style>
  body { font-family: Arial, sans-serif; background: #f0f0f0; }
  #chat { max-width: 600px; margin: 50px auto; background: #fff; padding: 20px; border-radius: 10px; }
  #messages { height: 400px; overflow-y: auto; border: 1px solid #ccc; padding: 10px; }
  .message { margin-bottom: 10px; }
  .user { color: blue; }
  .bot { color: green; }
  #input { width: 80%; padding: 10px; }
  #send { padding: 10px 20px; }
</style>
</head>
<body>
<div id="chat">
  <h2>شات كتابي</h2>
  <div id="messages"></div>
  <input type="text" id="input" placeholder="اكتب رسالتك..." />
  <button id="send">إرسال</button>
</div>

<script>
const messagesDiv = document.getElementById('messages');
const input = document.getElementById('input');
const sendButton = document.getElementById('send');

async function sendMessage() {
  const message = input.value;
  if (!message) return;

  // عرض رسالة المستخدم
  const userMsg = document.createElement('div');
  userMsg.className = 'message user';
  userMsg.innerText = message;
  messagesDiv.appendChild(userMsg);

  input.value = '';

  // إرسال الرسالة إلى السيرفر
  const response = await fetch('http://localhost:5000/message', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ message }),
  });
  const data = await response.json();

  // عرض رد النموذج
  const botMsg = document.createElement('div');
  botMsg.className = 'message bot';
  botMsg.innerText = data.reply;
  messagesDiv.appendChild(botMsg);

  messagesDiv.scrollTop = messagesDiv.scrollHeight;
}

sendButton.onclick = sendMessage;
input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') sendMessage();
});
</script>
</body>
</html>
